name: expense_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ✅ REQUIRED for multi-language (l10n)
  flutter_localizations:
    sdk: flutter

  firebase_core: ^4.1.1
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.0.0
  intl: ^0.20.0
  provider: ^6.1.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.5
  syncfusion_flutter_charts: ^32.1.21
  fl_chart: ^0.65.0
  google_mlkit_text_recognition: ^0.11.0
  firebase_storage: ^13.0.4
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  http: ^1.2.2
  local_auth: ^2.1.6
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # ✅ REQUIRED for Flutter localization code generation
  generate: true

  uses-material-design: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
